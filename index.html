<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment Koran | Premium Academic Support</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary: #6366f1;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --bg: #ffffff;
            --zinc-50: #f8fafc;
            --zinc-100: #f1f5f9;
            --zinc-200: #e2e8f0;
        }

        .dark {
            --text-main: #f4f4f5;
            --text-muted: #a1a1aa;
            --bg: #09090b;
            --zinc-50: #18181b;
            --zinc-100: #27272a;
            --zinc-200: #3f3f46;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            width: 90%;
            max-width: 800px;
            text-align: center;
            animation: reveal 1s cubic-bezier(0.19, 1, 0.22, 1);
        }

        @keyframes reveal {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .brand {
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            font-weight: 800;
            letter-spacing: -0.05em;
            margin-bottom: 1rem;
            line-height: 1;
        }

        .tagline {
            font-size: 1rem;
            color: var(--text-muted);
            font-weight: 400;
            margin-bottom: 4rem;
            letter-spacing: 0.05em;
        }

        .search-container {
            position: relative;
            max-width: 500px;
            margin: 0 auto 3rem;
        }

        .input-group {
            display: flex;
            background: var(--zinc-50);
            border: 1px solid var(--zinc-100);
            padding: 0.5rem;
            border-radius: 24px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.05);
        }

        .input-group:focus-within {
            background: #fff;
            border-color: var(--primary);
            box-shadow: 0 20px 40px -15px rgba(79, 70, 229, 0.1);
            transform: translateY(-2px);
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 1rem 1.5rem;
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-main);
            outline: none;
        }

        input::placeholder {
            color: #94a3b8;
            font-weight: 400;
        }

        .btn-track {
            background: var(--primary);
            color: #fff;
            border: none;
            padding: 0 2rem;
            border-radius: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s;
            font-size: 0.9rem;
        }

        .btn-track:hover {
            opacity: 0.9;
        }

        .nav-links {
            display: flex;
            justify-content: center;
            gap: 3rem;
            margin-top: 3rem;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-muted);
            font-size: 1.5rem;
            transition: all 0.2s;
        }

        .nav-links a:hover {
            color: var(--primary);
            transform: translateY(-3px);
        }

        .theme-toggle {
            position: fixed;
            top: 2rem;
            right: 2rem;
            background: var(--zinc-50);
            border: 1px solid var(--zinc-100);
            color: var(--text-main);
            padding: 0.6rem;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            z-index: 100;
        }

        .theme-toggle:hover {
            background: var(--zinc-100);
            transform: scale(1.05);
        }

        footer {
            position: fixed;
            bottom: 3rem;
            font-size: 0.7rem;
            font-weight: 600;
            color: #94a3b8;
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }

        .main-actions-stack {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            gap: 1.5rem;
        }
        .portal-trigger-wrapper { width: 100%; display: flex; justify-content: center; }
        .btn-portal-toggle {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(5px);
            border: 1px solid var(--zinc-200);
            color: var(--text-muted);
            padding: 0.8rem 2rem;
            border-radius: 16px;
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 0.7rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .dark .btn-portal-toggle { border-color: var(--zinc-800); background: rgba(0,0,0,0.2); }
        .btn-portal-toggle:hover {
            border-color: var(--primary);
            color: var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.2);
        }
        .client-login-panel {
            width: 100%;
            max-width: 400px;
            animation: slideUp 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .panel-inner {
            background: var(--bg-card);
            border: 1px solid var(--zinc-200);
            padding: 1.5rem;
            border-radius: 24px;
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.1);
        }
        .dark .panel-inner { border-color: var(--zinc-800); }
        .panel-tag {
            font-size: 0.65rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--primary);
            margin-bottom: 1rem;
            text-align: center;
        }
        .portal-input {
            width: 100%;
            padding: 0.8rem 1rem;
            background: var(--zinc-50);
            border: 1px solid var(--zinc-100);
            border-radius: 12px;
            font-size: 0.9rem;
            color: var(--text-main);
            outline: none;
            transition: all 0.2s;
            margin-bottom: 0.7rem;
        }
        .dark .portal-input { background: var(--zinc-900); border-color: var(--zinc-800); }
        .portal-input:focus { border-color: var(--primary); }
        .btn-portal-login {
            width: 100%;
            padding: 0.8rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-portal-login:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(99, 102, 241, 0.3); }
        .hidden { display: none; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 640px) {
            .input-group { flex-direction: column; padding: 0.5rem; gap: 0.5rem; border-radius: 20px; }
            .btn-track { padding: 1.2rem; border-radius: 16px; }
            input { text-align: center; }
            .nav-links { gap: 1.5rem; }
        }
    </style>
</head>
<body>

    <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle Theme">
        <svg id="moon-icon" class="hidden" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
        <svg id="sun-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
    </button>

    <div class="container">
        <h1 class="brand">Assignment Koran</h1>
        <p class="tagline">Expert Academic Solutions & Implementation</p>

        <div class="search-container">
            <div class="main-actions-stack">
                <div class="search-box">
                    <input type="text" id="trackId" placeholder="Order Tracking ID" spellcheck="false">
                    <button class="btn-track" onclick="trackOrder()">Track</button>
                </div>
                
                <div class="portal-trigger-wrapper">
                    <button onclick="toggleClientLogin()" class="btn-portal-toggle">
                        <i class="fa-solid fa-user-graduate"></i> 
                        <span>Access Scholar Dashboard</span>
                    </button>
                </div>

                <div id="clientLoginPanel" class="client-login-panel hidden">
                    <div class="panel-inner">
                        <p class="panel-tag">Client Login</p>
                        <div class="portal-input-wrapper">
                            <input type="text" id="clientPhone" placeholder="Your Phone Number" class="portal-input">
                        </div>
                        <button class="btn-portal-login" onclick="loginToClientPortal()">Access Now</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="nav-links">
            <a href="ak.html" title="Our Services"><i class="fa-solid fa-globe"></i></a>
            <a href="https://facebook.com/assignmentkoran" target="_blank" title="Facebook"><i class="fa-brands fa-facebook-f"></i></a>
            <a href="mailto:support@assignmentkoran.com" title="Contact Email"><i class="fa-solid fa-envelope"></i></a>
        </div>
    </div>

    <footer>
        &copy; 2024 Assignment Koran &bull; Excellence in Research
    </footer>

    <script>
        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
            const isDark = document.documentElement.classList.contains('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateIcons();
        }

        function updateIcons() {
            const isDark = document.documentElement.classList.contains('dark');
            document.getElementById('moon-icon').style.display = isDark ? 'none' : 'block';
            document.getElementById('sun-icon').style.display = isDark ? 'block' : 'none';
        }

        // Initialize theme
        if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }
        updateIcons();

        function trackOrder() {
            let id = document.getElementById('trackId').value.trim();
            id = id.replace(/^#/, "").trim();
            if (id) window.location.href = `admin/?track=${id}`;
        }

        function toggleClientLogin() {
            const panel = document.getElementById("clientLoginPanel");
            panel.classList.toggle("hidden");
            if (!panel.classList.contains("hidden")) {
                document.getElementById("clientPhone").focus();
            }
        }

        async function loginToClientPortal() {
            const phone = document.getElementById("clientPhone").value.trim();

            if (!phone) {
                alert("Please enter your registered phone number.");
                return;
            }

            try {
                const res = await fetch(`/api/client-portal/auth?phone=${encodeURIComponent(phone)}`);
                const data = await res.json();

                if (data.success) {
                    localStorage.setItem('clientSession', data.token);
                    localStorage.setItem('clientPhone', phone);
                    window.location.href = '/client/';
                } else {
                    alert(data.error || "Authentication failed. Check your phone number.");
                }
            } catch (err) {
                alert("Connection error. Please try again.");
            }
        }

        document.getElementById('trackId').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') trackOrder();
        });
    </script>
</body>
</html>
